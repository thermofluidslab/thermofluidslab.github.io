<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HGZ2VLQ2GP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HGZ2VLQ2GP');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ログイン | 研究室メンバー専用</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #2c2c2c;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1b3a6b;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1b3a6b;
      margin-bottom: 32px;
    }
    label {
      display: block;
      text-align: left;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #5a5a6a;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8dde4;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #2a5298;
    }
    .error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 8px;
      min-height: 1.2em;
      text-align: left;
    }
    button[type="submit"] {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: #1b3a6b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #2a5298; }
    .back-link {
      display: block;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #5a5a6a;
    }
    .back-link a { color: #2a5298; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">熱流体力学研究室</div>
    <h1>メンバー専用ページ</h1>
    <form id="loginForm">
      <label for="password">パスワード</label>
      <input type="password" id="password" autocomplete="current-password" autofocus>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit">ログイン</button>
    </form>
    <span class="back-link"><a href="../index.html">← トップページに戻る</a></span>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const pw = document.getElementById("password").value;
      if (!doLogin(pw)) {
        document.getElementById("errorMsg").textContent = "パスワードが正しくありません．";
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });
  </script>
</body>
</html>
