<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="熱流体力学研究室 — 工学院大学 工学部 機械工学科">
  <title>熱流体力学研究室 | 工学院大学</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/header.js"></script>
  <script>initSharedLayout('home');</script>

  <!-- ヒーロー -->
  <section id="hero">
    <div class="container">
      <h1 data-i18n="hero.title"></h1>
      <p class="hero-affiliation" data-i18n="hero.affiliation"></p>
      <p class="hero-tagline" data-i18n="hero.tagline"></p>
    </div>
  </section>

  <!-- 研究室概要（簡略） -->
  <section id="intro">
    <div class="container">
      <div class="intro-wrap">
        <p id="homeIntro" class="home-intro-text"></p>
        <p class="home-prof-line">
          <span data-i18n="about.profName"></span>
          <span class="home-prof-sub" data-i18n="about.profTitle"></span>
        </p>
      </div>
    </div>
  </section>

  <!-- お知らせ -->
  <section id="news">
    <div class="container">
      <h2 data-i18n="news.title"></h2>
      <ul class="news-list" id="newsList"></ul>
    </div>
  </section>

  <footer><div class="container footer-inner"><p id="footerCopy"></p></div></footer>

  <script src="data/content.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); }
        });
      }, { threshold: 0.07 });
      document.querySelectorAll("section:not(#hero)").forEach(function (s) { obs.observe(s); });
    })();
  </script>
</body>
</html>
